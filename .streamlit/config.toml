# Streamlit Cloud deployment configuration
# Place this file at .streamlit/config.toml in your repo root

[theme]
base = "dark"
primaryColor = "#3b82f6"
backgroundColor = "#0a1628"
secondaryBackgroundColor = "#111d35"
textColor = "#f1f5f9"
font = "sans serif"

[server]
maxUploadSize = 10
enableXsrfProtection = true

[browser]
gatherUsageStats = false
